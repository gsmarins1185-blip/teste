<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilo/EstiloClientePD.css">
    <script src="script/scriptPD.js" defer></script>

    <title>GEC - Produtos</title>
    <style>
        @font-face {
            src: url('Fontes/UberMoveMedium.otf') format('opentype');
            font-family: 'Uber';
        }
    </style>

</head>
<body class="bg-light">
    <header class="gec-header">
        <div class="logo-header">
            <img src="img/logo-fundo-laranja.png" alt="Ponte Dourada" height="45">
        </div>
        <div class="sector-tag">Setor: <strong>GESTOR</strong></div>
    </header>

    <main class="container">
        <div class="top-bar">
            <button class="btn-secondary" onclick="window.history.back()">Voltar</button>
            <h1>Cadastro de Produtos / Materiais</h1>
        </div>

        <form id="form-produto">
            <fieldset class="form-section">
                <legend>Identificação do Produto</legend>
                <div class="row">
                    <div class="col">
                        <label for="nome-produto">Nome do Produto</label>
                        <input type="text" id="nome-produto" name="nome-produto" required placeholder="Ex: Gaze Estéril">
                    </div>
                </div>
                <div class="row">
                    <div class="col">
                        <label for="descricao">Descrição Detalhada</label>
                        <textarea id="descricao" name="descricao" rows="3" placeholder="Especificações técnicas..."></textarea>
                    </div>
                </div>
            </fieldset>

            <fieldset class="form-section">
                <legend>Estoque e Valores</legend>
                <div class="row">
                    <div class="col">
                        <label for="unidade">Unidade de Medida</label>
                        <select id="unidade" name="unidade" required>
                            <option value="">Selecione...</option>
                            <option value="un">Unidade</option>
                            <option value="cx">Caixa</option>
                            <option value="pct">Pacote</option>
                            <option value="ml">Mililitros (ml)</option>
                        </select>
                    </div>
                    <div class="col">
                        <label for="preco">Preço Unitário (R$)</label>
                        <input type="text" id="preco" name="preco" required placeholder="0,00">
                    </div>
                </div>
                <div class="row">
                    <div class="col">
                        <label for="estoque-minimo">Estoque Mínimo</label>
                        <input type="number" id="estoque-minimo" name="estoque-minimo" value="0">
                    </div>
                    <div class="col">
                        <label for="estoque-atual">Quantidade Atual</label>
                        <input type="number" id="estoque-atual" name="estoque-atual" required>
                    </div>
                </div>
            </fieldset>

            <div class="form-footer">
                <button type="submit" class="btn-primary" onclick="salvar()">SALVAR PRODUTO</button>
            </div>
        </form>
    </main>

    <footer class="main-footer">
        <div class="footer-content">
            <p>&copy; 2026 Ponte Dourada - Controle de Suprimentos</p>
        </div>
    </footer>

    <script src="https://unpkg.com/imask"></script>
    <script src="script.js"></script>
</body>

</html>
